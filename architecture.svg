<svg viewBox="0 0 860 460" xmlns="http://www.w3.org/2000/svg" font-family="Inter,Segoe UI,sans-serif">
  <rect width="860" height="460" fill="#f7f4ec"/>
  <text x="30" y="40" font-size="20" font-weight="700" fill="#0f3d2e">Manzil — Architecture (Arc · USDC · Circle)</text>

  <!-- User -->
  <rect x="30" y="80" width="160" height="80" rx="12" fill="#fffdf8" stroke="#b8923f" stroke-width="1.5"/>
  <text x="110" y="115" font-size="14" font-weight="700" fill="#1c2a24" text-anchor="middle">User wallet</text>
  <text x="110" y="135" font-size="11" fill="#7c8a82" text-anchor="middle">MetaMask / Circle Wallets</text>

  <!-- Frontend -->
  <rect x="250" y="60" width="200" height="120" rx="12" fill="#0f3d2e"/>
  <text x="350" y="92" font-size="14" font-weight="700" fill="#fffdf8" text-anchor="middle">Manzil Frontend</text>
  <text x="350" y="112" font-size="11" fill="#cfe3d6" text-anchor="middle">Next.js · wagmi · viem</text>
  <text x="350" y="134" font-size="10.5" fill="#cfe3d6" text-anchor="middle">Homes · Deposit · Installments</text>
  <text x="350" y="150" font-size="10.5" fill="#cfe3d6" text-anchor="middle">Autopay · Swap · Earn · Pool · Bridge</text>

  <!-- Arc contract -->
  <rect x="520" y="60" width="200" height="120" rx="12" fill="#fffdf8" stroke="#0f3d2e" stroke-width="1.5"/>
  <text x="620" y="90" font-size="14" font-weight="700" fill="#0f3d2e" text-anchor="middle">Manzil.sol — Arc L1</text>
  <text x="620" y="110" font-size="10.5" fill="#1c2a24" text-anchor="middle">listHome/buyShares (RWA)</text>
  <text x="620" y="126" font-size="10.5" fill="#1c2a24" text-anchor="middle">openPlan/release/refund (escrow)</text>
  <text x="620" y="142" font-size="10.5" fill="#1c2a24" text-anchor="middle">enableAutopay/charge (agent)</text>
  <text x="620" y="158" font-size="10.5" fill="#1c2a24" text-anchor="middle">AMM swap/LP + earn vault</text>

  <!-- Circle tools -->
  <rect x="250" y="230" width="470" height="90" rx="12" fill="#fff" stroke="#ddd3ba" stroke-width="1.5"/>
  <text x="270" y="256" font-size="13" font-weight="700" fill="#b8923f">Circle on Arc</text>
  <text x="270" y="280" font-size="11" fill="#1c2a24">USDC (native) · Wallets (App ID) · Gateway (unified balance)</text>
  <text x="270" y="300" font-size="11" fill="#1c2a24">CCTP / Bridge Kit (App Kit) · Nanopayments · USYC · StableFX</text>

  <!-- Destination chains -->
  <rect x="250" y="360" width="470" height="70" rx="12" fill="#eef3ee" stroke="#9fb3a4" stroke-width="1.2"/>
  <text x="270" y="386" font-size="13" font-weight="700" fill="#0f3d2e">Bridge → testnets (CCTP burn/mint)</text>
  <text x="270" y="408" font-size="11" fill="#1c2a24">Base Sepolia · Ethereum Sepolia · Avalanche Fuji</text>

  <!-- arrows -->
  <line x1="190" y1="120" x2="250" y2="120" stroke="#7c8a82" stroke-width="2" marker-end="url(#a)"/>
  <line x1="450" y1="120" x2="520" y2="120" stroke="#7c8a82" stroke-width="2" marker-end="url(#a)"/>
  <line x1="350" y1="180" x2="350" y2="230" stroke="#7c8a82" stroke-width="2" marker-end="url(#a)"/>
  <line x1="620" y1="180" x2="620" y2="230" stroke="#7c8a82" stroke-width="2" marker-end="url(#a)"/>
  <line x1="485" y1="320" x2="485" y2="360" stroke="#7c8a82" stroke-width="2" marker-end="url(#a)"/>
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#7c8a82"/></marker></defs>
</svg>
